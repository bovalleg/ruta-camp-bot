name: "\U0001F9E0 Actualizar Conocimiento de Marca"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scrape rutacamp.cl y generar resumen de marca
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install requests beautifulsoup4 -q
          python3 - <<'PYEOF'
          import os, json, re, time, urllib.request, urllib.error
          from datetime import datetime, timezone
          from bs4 import BeautifulSoup
          import requests

          ANTHROPIC_KEY = os.environ.get("ANTHROPIC_API_KEY", "").strip()
          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; RutaCampBot/1.0)"}

          def fetch_text(url):
              try:
                  r = requests.get(url, headers=HEADERS, timeout=15)
                  r.raise_for_status()
                  soup = BeautifulSoup(r.text, "html.parser")
                  for tag in soup(["script","style","nav","footer","header","noscript","svg"]):
                      tag.decompose()
                  lines = [l.strip() for l in soup.get_text(separator="\n", strip=True).splitlines() if l.strip()]
                  return "\n".join(lines)[:5000]
              except Exception as e:
                  print("  No se pudo obtener " + url + ": " + str(e))
                  return ""

          print("Scrapeando rutacamp.cl...")
          pages = {
              "main":         "https://www.rutacamp.cl",
              "about":        "https://www.rutacamp.cl/nosotros",
              "services":     "https://www.rutacamp.cl/servicios",
              "destinations": "https://www.rutacamp.cl/destinos",
              "blog":         "https://www.rutacamp.cl/blog",
          }

          website_content = {}
          all_web_text = ""
          for key, url in pages.items():
              print("  Fetching " + url)
              text = fetch_text(url)
              website_content[key] = text[:2000]
              all_web_text += "\n\n=== " + key.upper() + " ===\n" + text
              time.sleep(1)

          brand_knowledge = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "brand": {"name": "Ruta Camp"},
              "websiteContent": website_content,
              "instagramInsights": {"recentCaptions": [], "commonHashtags": [], "contentThemes": []},
              "brandSummary": ""
          }

          if ANTHROPIC_KEY:
              print("\nAnalizando con Claude...")
              prompt = "Analiza el contenido del sitio web de Ruta Camp y genera un resumen de marca para usar en prompts de IA. Incluye: que es Ruta Camp, destinos, audiencia, tono de comunicacion, valores y palabras clave frecuentes. Responde en espanol, conciso.\n\n--- CONTENIDO ---\n" + all_web_text[:10000]
              try:
                  payload = json.dumps({
                      "model": "claude-haiku-4-5-20251001",
                      "max_tokens": 1000,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={
                          "x-api-key": ANTHROPIC_KEY,
                          "anthropic-version": "2023-06-01",
                          "content-type": "application/json",
                      },
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                      brand_knowledge["brandSummary"] = result["content"][0]["text"]
                      print("Resumen generado.")
              except Exception as e:
                  print("Error Claude API: " + str(e))
                  brand_knowledge["brandSummary"] = "(sin sintesis - verifica ANTHROPIC_API_KEY)"
          else:
              brand_knowledge["brandSummary"] = "(sin sintesis - agrega ANTHROPIC_API_KEY en Secrets)"

          with open("data/brand-knowledge.json", "w", encoding="utf-8") as f:
              json.dump(brand_knowledge, f, ensure_ascii=False, indent=2)

          print("data/brand-knowledge.json actualizado.")

          sp = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if sp:
              with open(sp, "a") as f:
                  f.write("## Conocimiento de Marca Actualizado\n\n")
                  f.write("- **Fecha:** " + brand_knowledge["updatedAt"] + "\n")
                  f.write("- **Paginas:** " + str(len([v for v in website_content.values() if v])) + "\n\n")
                  summary = brand_knowledge.get("brandSummary","")
                  if summary and not summary.startswith("("):
                      f.write("### Sintesis\n\n" + summary[:1000] + "\n")
          PYEOF

      - name: Commit brand knowledge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brand-knowledge.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "🧠 Actualizar conocimiento de marca"
            git push
          fi
