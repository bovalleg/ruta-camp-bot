name: "\U0001F4E4 Enviar Post a Buffer"

on:
  workflow_dispatch:
    inputs:
      caption:
        description: "Texto del post"
        required: true
      hashtags:
        description: "Hashtags"
        required: false
        default: ""
      scheduled_at:
        description: "Fecha ISO 8601 (ej: 2026-05-01T12:00:00Z). Vacio = queue automatico."
        required: false
        default: ""
      post_type:
        description: "Tipo: post | reel | story"
        required: false
        default: "post"
      image_ids:
        description: "IDs de Google Drive separados por coma (1 para post/reel/story, varios para carrusel)"
        required: false
        default: ""
      image_names:
        description: "Nombres de archivo separados por coma (mismo orden que image_ids)"
        required: false
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enviar a Buffer via MCP
        env:
          BUFFER_TOKEN:    ${{ secrets.BUFFER_TOKEN }}
          BUFFER_PROFILE:  ${{ secrets.BUFFER_PROFILE_ID }}
          GOOGLE_API_KEY:  ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pip install Pillow -q
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json, re, io
          from PIL import Image

          token      = os.environ.get("BUFFER_TOKEN", "").strip()
          channel    = os.environ.get("BUFFER_PROFILE", "").strip()
          google_key = os.environ.get("GOOGLE_API_KEY", "").strip()
          caption    = """${{ inputs.caption }}"""
          hashtags   = """${{ inputs.hashtags }}"""
          sched      = "${{ inputs.scheduled_at }}".strip()
          post_type  = "${{ inputs.post_type }}".strip() or "post"
          image_ids_raw  = "${{ inputs.image_ids }}".strip()
          image_names_raw = "${{ inputs.image_names }}".strip()
          MCP_URL    = "https://mcp.buffer.com/mcp"
          GH_REPO    = os.environ.get("GITHUB_REPOSITORY", "bovalleg/ruta-camp-bot")

          # Soporte para imagen unica (retrocompat) y multiples (carrusel)
          image_ids  = [x.strip() for x in image_ids_raw.split(",") if x.strip()]
          image_names_list = [x.strip() for x in image_names_raw.split(",") if x.strip()]

          text = caption.strip()
          if hashtags.strip():
              text += "\n\n" + hashtags.strip()

          print("Canal: " + (channel or "(auto)"))
          print("Imagenes Drive: " + str(len(image_ids)) + " (" + ", ".join(image_ids) + ")")
          print("Tipo: " + post_type)

          # ── Comprimir imagen si supera 9 MB ──
          MAX_BYTES = 9 * 1024 * 1024  # 9 MB (Buffer rechaza >10 MB)

          def compress_image(img_bytes, fname):
              if len(img_bytes) <= MAX_BYTES:
                  return img_bytes, fname
              orig_kb = len(img_bytes) // 1024
              print("  Comprimiendo " + fname + " (" + str(orig_kb) + " KB)...")
              try:
                  img = Image.open(io.BytesIO(img_bytes))
                  # Convertir a RGB (elimina transparencia de PNG, etc.)
                  if img.mode not in ("RGB", "L"):
                      img = img.convert("RGB")
                  base = re.sub(r'\.[^.]+$', '', fname)
                  out_name = base + ".jpg"
                  # Intentar distintas calidades JPEG
                  for quality in (90, 82, 75, 65, 55):
                      buf = io.BytesIO()
                      img.save(buf, format="JPEG", quality=quality, optimize=True, subsampling=2)
                      data = buf.getvalue()
                      if len(data) <= MAX_BYTES:
                          print("  Resultado: " + str(len(data)//1024) + " KB (JPEG q=" + str(quality) + ")")
                          return data, out_name
                  # Aún muy grande → reducir dimensiones preservando aspecto
                  w, h = img.size
                  for scale in (0.85, 0.75, 0.65, 0.55, 0.45):
                      nw, nh = int(w * scale), int(h * scale)
                      resized = img.resize((nw, nh), Image.LANCZOS)
                      buf = io.BytesIO()
                      resized.save(buf, format="JPEG", quality=75, optimize=True)
                      data = buf.getvalue()
                      if len(data) <= MAX_BYTES:
                          print("  Resultado: " + str(nw) + "x" + str(nh) + " px, " + str(len(data)//1024) + " KB (escala " + str(scale) + ")")
                          return data, out_name
              except Exception as e:
                  print("  Advertencia: no se pudo comprimir (" + str(e) + "), se usará original")
              return img_bytes, fname

          # ── Descargar imágenes de Google Drive ──
          public_image_urls = []
          if image_ids and google_key:
              print("\n📥 Descargando " + str(len(image_ids)) + " imagen(es) de Google Drive...")
              os.makedirs("media", exist_ok=True)
              os.system('git config user.name "github-actions[bot]"')
              os.system('git config user.email "github-actions[bot]@users.noreply.github.com"')
              for idx, image_id in enumerate(image_ids):
                  fallback_name = image_names_list[idx] if idx < len(image_names_list) else (image_id + ".jpg")
                  try:
                      meta_url = "https://www.googleapis.com/drive/v3/files/" + image_id + "?fields=name,mimeType&key=" + google_key
                      with urllib.request.urlopen(urllib.request.Request(meta_url), timeout=15) as r:
                          meta = json.loads(r.read())
                      fname = meta.get("name", fallback_name)
                      print("  [" + str(idx+1) + "] Archivo: " + fname)

                      dl_url = "https://www.googleapis.com/drive/v3/files/" + image_id + "?alt=media&key=" + google_key
                      with urllib.request.urlopen(urllib.request.Request(dl_url), timeout=30) as r2:
                          img_bytes = r2.read()
                      print("  [" + str(idx+1) + "] Descargado: " + str(len(img_bytes)//1024) + " KB")

                      # Comprimir si es necesario
                      img_bytes, fname = compress_image(img_bytes, fname)

                      safe_name = re.sub(r'[^a-zA-Z0-9._-]', '_', fname)
                      media_path = "media/" + safe_name
                      with open(media_path, "wb") as f:
                          f.write(img_bytes)

                      public_url = "https://raw.githubusercontent.com/" + GH_REPO + "/main/" + media_path
                      public_image_urls.append(public_url)
                      print("  [" + str(idx+1) + "] URL publica: " + public_url)

                  except Exception as e:
                      print("  [" + str(idx+1) + "] ⚠ No se pudo descargar " + image_id + ": " + str(e))

              if public_image_urls:
                  os.system('git add media/')
                  os.system('git diff --cached --quiet || git commit -m "📸 Imagenes para Buffer (' + str(len(public_image_urls)) + ')"')
                  os.system('git push')
                  print("  " + str(len(public_image_urls)) + " imagen(es) subida(s) al repo.")

          elif image_ids and not google_key:
              print("⚠ image_ids recibido pero GOOGLE_API_KEY no esta configurado en Secrets.")

          # ── MCP helpers ──
          def post_mcp(payload, session_id=None):
              data = json.dumps(payload).encode()
              hdrs = {"Authorization": "Bearer " + token,
                      "Content-Type": "application/json",
                      "Accept": "application/json, text/event-stream"}
              if session_id:
                  hdrs["Mcp-Session-Id"] = session_id
              req = urllib.request.Request(MCP_URL, data=data, headers=hdrs, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return r.read().decode(), r.headers.get("Mcp-Session-Id",""), r.status
              except urllib.error.HTTPError as e:
                  print("HTTP " + str(e.code) + ": " + e.read().decode()[:200])
                  return "", "", e.code

          def extract(body):
              for line in body.splitlines():
                  if line.strip().startswith("data:"):
                      chunk = line.strip()[5:].strip()
                      if chunk and chunk != "[DONE]":
                          try: return json.loads(chunk)
                          except: pass
              try: return json.loads(body)
              except: return {}

          def content_text(parsed):
              try: return parsed["result"]["content"][0]["text"]
              except: return ""

          # Init MCP
          body, sid, status = post_mcp({"jsonrpc":"2.0","id":1,"method":"initialize",
              "params":{"protocolVersion":"2024-11-05","capabilities":{},
                        "clientInfo":{"name":"ruta-camp-bot","version":"1.0"}}})
          if status not in (200,201,202):
              print("ERROR init: " + str(status)); exit(1)
          print("\nMCP conectado.")

          # get_account → org_id
          body2, _, _ = post_mcp({"jsonrpc":"2.0","id":2,"method":"tools/call",
              "params":{"name":"get_account","arguments":{}}}, session_id=sid)
          acc_text = content_text(extract(body2))
          org_id = ""
          try:
              acc = json.loads(acc_text) if acc_text else {}
              orgs = acc.get("organizations",[])
              if orgs: org_id = orgs[0].get("id","")
          except: pass
          print("Org ID: " + org_id)

          # Auto-detectar canal
          if not channel and org_id:
              body3, _, _ = post_mcp({"jsonrpc":"2.0","id":3,"method":"tools/call",
                  "params":{"name":"list_channels","arguments":{"organizationId":org_id}}}, session_id=sid)
              ch_text = content_text(extract(body3))
              try:
                  chs = json.loads(ch_text) if ch_text else []
                  if chs: channel = chs[0].get("id","")
                  print("Canal auto: " + channel)
              except: pass

          if not channel:
              print("ERROR: no se encontro canal."); exit(1)

          # Normalizar scheduled_at a ISO 8601
          if sched and sched.isdigit():
              import datetime
              sched = datetime.datetime.fromtimestamp(int(sched), tz=datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          # ── create_post con imagen(es) ──
          result_text = ""
          if public_image_urls:
              n_imgs = len(public_image_urls)
              label = "carrusel de " + str(n_imgs) + " imagenes" if n_imgs > 1 else "con imagen"
              print("\n📤 Creando post (" + label + ") en Buffer...")
              # Buffer acepta hasta 10 imágenes en assets.images para carruseles
              assets_images = [{"url": u, "metadata": {"altText": "Ruta Camp"}} for u in public_image_urls]
              # post_type: si es carrusel de >1 imagen, forzar 'post' (Instagram carrusel = post feed)
              ig_type = post_type if post_type in ("post","reel","story") else "post"
              if n_imgs > 1:
                  ig_type = "post"
              post_args = {
                  "channelId": channel,
                  "schedulingType": "automatic",
                  "text": text,
                  "assets": {"images": assets_images},
                  "metadata": {
                      "instagram": {
                          "type": ig_type,
                          "shouldShareToFeed": True
                      }
                  }
              }
              if sched:
                  post_args["mode"] = "customScheduled"
                  post_args["dueAt"] = sched
              else:
                  post_args["mode"] = "addToQueue"

              body4, _, _ = post_mcp({"jsonrpc":"2.0","id":4,"method":"tools/call",
                  "params":{"name":"create_post","arguments":post_args}}, session_id=sid)
              result_text = content_text(extract(body4))
              print("Respuesta: " + result_text[:400])

              if '"isError":true' in body4 or '"error"' in result_text:
                  print("\n⚠ create_post fallo — usando create_idea como fallback...")
                  public_image_urls = []

          # ── create_idea (fallback o sin imagen) ──
          if not public_image_urls:
              print("\n📝 Creando idea en Buffer...")
              idea_content = {"text": text, "services": ["instagram"]}
              if org_id:
                  idea_args = {"organizationId": org_id, "content": idea_content}
                  body5, _, _ = post_mcp({"jsonrpc":"2.0","id":5,"method":"tools/call",
                      "params":{"name":"create_idea","arguments":idea_args}}, session_id=sid)
                  result_text = content_text(extract(body5))
                  print("Respuesta: " + result_text[:400])

          try:
              rd = json.loads(result_text) if result_text else {}
              post_id = rd.get("id") or (rd.get("post") or rd.get("idea") or {}).get("id","?")
          except: post_id = "?"

          n_sent = len(public_image_urls)
          if n_sent > 1:
              mode_label = "carrusel de " + str(n_sent) + " imagenes"
          elif n_sent == 1:
              mode_label = "con imagen"
          else:
              mode_label = "como idea (sin imagen)"
          print("\n✅ Enviado a Buffer " + mode_label + "! ID: " + str(post_id))

          sp = os.environ.get("GITHUB_STEP_SUMMARY","")
          if sp:
              with open(sp,"a") as f:
                  f.write("## Post enviado a Buffer\n\n")
                  f.write("- **Modo:** " + mode_label + "\n")
                  f.write("- **Canal:** `" + channel + "`\n")
                  f.write("- **Programado:** " + (sched or "queue automatico") + "\n\n")
                  f.write("**Texto:**\n\n" + text[:400] + "\n")
          PYEOF

      - name: Error summary
        if: failure()
        run: |
          echo "## Error al enviar a Buffer" >> $GITHUB_STEP_SUMMARY
          echo "Revisa los logs del paso anterior." >> $GITHUB_STEP_SUMMARY
