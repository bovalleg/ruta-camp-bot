name: 📤 Enviar Post a Buffer

on:
  workflow_dispatch:
    inputs:
      caption:
        description: "Texto del post"
        required: true
      hashtags:
        description: "Hashtags"
        required: false
        default: ""
      scheduled_at:
        description: "Timestamp Unix de publicación (vacío = idea/borrador)"
        required: false
        default: ""
      post_type:
        description: "Tipo de contenido"
        required: false
        default: "post"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar a Buffer (GraphQL API)
        env:
          BUFFER_TOKEN:   ${{ secrets.BUFFER_TOKEN }}
          BUFFER_PROFILE: ${{ secrets.BUFFER_PROFILE_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse, json

          token    = os.environ["BUFFER_TOKEN"]
          channel  = os.environ.get("BUFFER_PROFILE", "").strip()
          caption  = """${{ inputs.caption }}"""
          hashtags = """${{ inputs.hashtags }}"""

          text = caption.strip()
          if hashtags.strip():
              text += "\n\n" + hashtags.strip()

          # Buffer nueva API GraphQL - CreateIdea crea un post en Ideas/Queue
          mutation = """
          mutation CreateIdea($input: CreateIdeaInput!) {
            createIdea(input: $input) {
              id
              content {
                text
              }
            }
          }
          """

          variables = {
              "input": {
                  "content": {
                      "text": text
                  }
              }
          }

          # Si hay channel ID, intentamos agregar al canal específico
          if channel:
              variables["input"]["channelId"] = channel

          payload = json.dumps({
              "query": mutation,
              "variables": variables
          }).encode()

          req = urllib.request.Request(
              "https://api.buffer.com/graphql",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              result = json.loads(resp.read())
              print(json.dumps(result, indent=2, ensure_ascii=False))

              if "errors" in result:
                  print(f"\n❌ Error: {result['errors']}")
                  exit(1)

              idea = result.get("data", {}).get("createIdea", {})
              if idea:
                  print(f"\n✅ Idea creada en Buffer. ID: {idea.get('id')}")
              else:
                  print("\n✅ Respuesta recibida de Buffer")
          PYEOF

      - name: Resumen
        run: |
          echo "## 📤 Post enviado a Buffer" >> $GITHUB_STEP_SUMMARY
          echo "- **Tipo:** ${{ inputs.post_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Caption:** ${{ inputs.caption }}" | head -c 200 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Hashtags:** ${{ inputs.hashtags }}" >> $GITHUB_STEP_SUMMARY
