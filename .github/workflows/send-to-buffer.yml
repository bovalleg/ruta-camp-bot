name: "\U0001F4E4 Enviar Post a Buffer"

on:
  workflow_dispatch:
    inputs:
      caption:
        description: "Texto del post"
        required: true
      hashtags:
        description: "Hashtags"
        required: false
        default: ""
      scheduled_at:
        description: "Fecha ISO 8601 (ej: 2026-05-01T12:00:00Z). Vacio = agregar a queue."
        required: false
        default: ""
      post_type:
        description: "Tipo de contenido"
        required: false
        default: "post"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar a Buffer via MCP
        env:
          BUFFER_TOKEN:   ${{ secrets.BUFFER_TOKEN }}
          BUFFER_PROFILE: ${{ secrets.BUFFER_PROFILE_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json

          token    = os.environ.get("BUFFER_TOKEN", "").strip()
          channel  = os.environ.get("BUFFER_PROFILE", "").strip()
          caption  = """${{ inputs.caption }}"""
          hashtags = """${{ inputs.hashtags }}"""
          sched    = "${{ inputs.scheduled_at }}".strip()
          MCP_URL  = "https://mcp.buffer.com/mcp"

          text = caption.strip()
          if hashtags.strip():
              text += "\n\n" + hashtags.strip()

          print("Canal configurado: " + (channel or "(sin ID — se buscara automaticamente)"))
          print("Texto: " + text[:100])
          if sched:
              print("Programado: " + sched)

          def post_mcp(payload_dict, session_id=None):
              data = json.dumps(payload_dict).encode()
              headers = {
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json",
                  "Accept": "application/json, text/event-stream",
              }
              if session_id:
                  headers["Mcp-Session-Id"] = session_id
              req = urllib.request.Request(MCP_URL, data=data, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      body = resp.read().decode()
                      sid = resp.headers.get("Mcp-Session-Id", "")
                      return body, sid, resp.status
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print("HTTP ERROR " + str(e.code) + ": " + body[:300])
                  return "", "", e.code

          def safe_json(text):
              if not text or not text.strip():
                  return {}
              text = text.strip()
              for line in text.splitlines():
                  line = line.strip()
                  if line.startswith("data:"):
                      chunk = line[5:].strip()
                      if chunk and chunk != "[DONE]":
                          try:
                              return json.loads(chunk)
                          except:
                              pass
              try:
                  return json.loads(text)
              except:
                  pass
              return {}

          def extract_text(parsed):
              try:
                  return parsed["result"]["content"][0]["text"]
              except (KeyError, IndexError, TypeError):
                  return ""

          # Init
          body, session_id, status = post_mcp({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "ruta-camp-bot", "version": "1.0"}
              }
          })
          if status not in (200, 201, 202):
              print("ERROR init MCP: " + str(status))
              exit(1)
          print("MCP conectado.")

          # Si no hay channel, obtenerlo via get_account + list_channels
          if not channel:
              print("Buscando canal automaticamente...")
              body_acc, _, _ = post_mcp({
                  "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                  "params": {"name": "get_account", "arguments": {}}
              }, session_id=session_id)
              acc_text = extract_text(safe_json(body_acc))
              org_id = ""
              try:
                  acc_data = json.loads(acc_text) if acc_text else {}
                  orgs = acc_data.get("organizations", [])
                  if orgs:
                      org_id = orgs[0].get("id", "")
              except:
                  pass

              if org_id:
                  body_ch, _, _ = post_mcp({
                      "jsonrpc": "2.0", "id": 3, "method": "tools/call",
                      "params": {"name": "list_channels", "arguments": {"organizationId": org_id}}
                  }, session_id=session_id)
                  ch_text = extract_text(safe_json(body_ch))
                  try:
                      channels = json.loads(ch_text) if ch_text else []
                      if channels:
                          channel = channels[0].get("id", "")
                          print("Canal encontrado: " + channels[0].get("name","?") + " (" + channel + ")")
                  except:
                      pass

          if not channel:
              print("ERROR: no se encontro canal de Buffer. Configura BUFFER_PROFILE_ID en Secrets.")
              exit(1)

          # Crear post
          print("\nCreando post en Buffer...")
          args = {
              "channelId": channel,
              "text": text,
              "schedulingType": "automatic",
          }
          if sched:
              # Aceptar ISO 8601 o Unix timestamp
              if sched.isdigit():
                  import datetime
                  iso = datetime.datetime.utcfromtimestamp(int(sched)).strftime('%Y-%m-%dT%H:%M:%SZ')
                  args["scheduledAt"] = iso
              else:
                  args["scheduledAt"] = sched

          body_post, _, status_post = post_mcp({
              "jsonrpc": "2.0", "id": 4, "method": "tools/call",
              "params": {"name": "create_post", "arguments": args}
          }, session_id=session_id)
          print("Status: " + str(status_post))
          print("Body: " + body_post[:600])

          post_text = extract_text(safe_json(body_post))
          print("Respuesta: " + post_text[:400])

          try:
              post_data = json.loads(post_text) if post_text else {}
              post_id = post_data.get("id") or post_data.get("post", {}).get("id", "?")
          except:
              post_id = "?"

          print("\n✅ Post enviado a Buffer! ID: " + str(post_id))

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("## Post enviado a Buffer\n\n")
                  f.write("- **Canal:** `" + channel + "`\n")
                  f.write("- **Programado:** " + (sched or "queue automatico") + "\n\n")
                  f.write("**Texto:**\n\n" + text[:400] + "\n")
          PYEOF

      - name: Error summary
        if: failure()
        run: |
          echo "## Error al enviar a Buffer" >> $GITHUB_STEP_SUMMARY
          echo "Revisa los logs del paso anterior." >> $GITHUB_STEP_SUMMARY
