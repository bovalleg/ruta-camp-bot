name: 🔍 Ver Canales de Buffer

on:
  workflow_dispatch:

jobs:
  profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener canales de Buffer (GraphQL API)
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json

          token = os.environ.get("BUFFER_TOKEN", "").strip()

          if not token:
              print("❌ El secret BUFFER_TOKEN está vacío.")
              print("   Ve a: Settings → Secrets and variables → Actions → New repository secret")
              print("   Nombre: BUFFER_TOKEN")
              print("   Valor: tu Personal Key de Buffer (publish.buffer.com → Settings → API → Personal Keys)")
              exit(1)

          print(f"Token: {token[:8]}...{token[-4:]} ({len(token)} caracteres)\n")

          # Buffer nueva API GraphQL
          query = """
          {
            channels {
              id
              name
              service
              serviceUsername
            }
          }
          """

          payload = json.dumps({"query": query}).encode()
          req = urllib.request.Request(
              "https://api.buffer.com/graphql",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  body = resp.read().decode()
                  result = json.loads(body)

                  if "errors" in result:
                      print(f"❌ Error GraphQL: {result['errors']}")
                      exit(1)

                  channels = result.get("data", {}).get("channels", [])
                  if not channels:
                      print("⚠ No se encontraron canales. Verifica que tu cuenta tenga canales conectados.")
                      exit(0)

                  print("✅ Canales encontrados:\n")
                  print("=" * 50)
                  for c in channels:
                      print(f"  Red:      {c.get('service','?').upper()}")
                      print(f"  Usuario:  @{c.get('serviceUsername') or c.get('name','?')}")
                      print(f"  ID:       {c.get('id','?')}  ← USA ESTE como BUFFER_PROFILE_ID")
                      print("-" * 50)

                  summary = os.environ.get("GITHUB_STEP_SUMMARY","")
                  if summary:
                      with open(summary,"a") as f:
                          f.write("## ✅ Canales de Buffer\n\n")
                          f.write("| Red | Usuario | ID — pégalo en el bot |\n")
                          f.write("|-----|---------|----------------------|\n")
                          for c in channels:
                              f.write(f"| {c.get('service','?')} | @{c.get('serviceUsername') or c.get('name','?')} | `{c.get('id','?')}` |\n")
                          f.write("\n**Pasos:**\n")
                          f.write("1. Copia el ID del canal de Instagram\n")
                          f.write("2. Agrégalo en Secrets: `BUFFER_PROFILE_ID`\n")
                          f.write("3. Pégalo en ⚙️ Configuración del bot → 'ID de Perfil'\n")

          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"HTTP {e.code} {e.reason}")
              print(f"Respuesta: {body}")
              exit(1)
          except Exception as ex:
              print(f"Error: {ex}")
              exit(1)
          PYEOF
