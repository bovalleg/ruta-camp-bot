name: "\U0001F50D Ver Canales de Buffer"

on:
  workflow_dispatch:

jobs:
  profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener canales via Buffer MCP
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json

          token = os.environ.get("BUFFER_TOKEN", "").strip()
          MCP_URL = "https://mcp.buffer.com/mcp"

          if not token:
              print("ERROR: BUFFER_TOKEN vacio")
              exit(1)

          print("Token: " + token[:8] + "..." + token[-4:])

          def post_mcp(payload_dict, session_id=None):
              data = json.dumps(payload_dict).encode()
              headers = {
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json",
                  "Accept": "application/json, text/event-stream",
              }
              if session_id:
                  headers["Mcp-Session-Id"] = session_id
              req = urllib.request.Request(MCP_URL, data=data, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      body = resp.read().decode()
                      sid = resp.headers.get("Mcp-Session-Id", "")
                      return body, sid, resp.status
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print("HTTP ERROR " + str(e.code) + ": " + body[:300])
                  return "", "", e.code

          def safe_json(text):
              if not text or not text.strip():
                  return {}
              text = text.strip()
              for line in text.splitlines():
                  line = line.strip()
                  if line.startswith("data:"):
                      chunk = line[5:].strip()
                      if chunk and chunk != "[DONE]":
                          try:
                              return json.loads(chunk)
                          except:
                              pass
              try:
                  return json.loads(text)
              except:
                  pass
              print("  [warn] no se pudo parsear: " + text[:200])
              return {}

          print("\n--- INIT ---")
          body, session_id, status = post_mcp({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "ruta-camp-bot", "version": "1.0"}
              }
          })
          print("Status: " + str(status))
          print("Session-Id: " + repr(session_id))
          print("Body: " + body[:400])

          if status not in (200, 201, 202):
              print("ERROR: no se pudo iniciar sesion MCP")
              exit(1)

          def extract_text(parsed):
              try:
                  return parsed["result"]["content"][0]["text"]
              except (KeyError, IndexError, TypeError):
                  return ""

          print("\n--- GET ACCOUNT ---")
          body_acc, _, status_acc = post_mcp({
              "jsonrpc": "2.0", "id": 2, "method": "tools/call",
              "params": {"name": "get_account", "arguments": {}}
          }, session_id=session_id)
          print("Status: " + str(status_acc))
          print("Body: " + body_acc[:800])

          parsed_acc = safe_json(body_acc)
          acc_text = extract_text(parsed_acc)
          print("Account text: " + acc_text[:400])

          org_id = ""
          try:
              acc_data = json.loads(acc_text) if acc_text else {}
              for path in [["organization","id"], ["account","organization","id"], ["id"]]:
                  d = acc_data
                  ok = True
                  for k in path:
                      if isinstance(d, dict) and k in d:
                          d = d[k]
                      else:
                          ok = False
                          break
                  if ok and d and isinstance(d, str):
                      org_id = d
                      break
          except Exception as ex:
              print("Error parseando account: " + str(ex))

          print("Org ID encontrado: " + repr(org_id))

          if not org_id:
              print("ERROR: no se pudo obtener organizationId. Body completo:")
              print(body_acc)
              exit(1)

          print("\n--- LIST CHANNELS ---")
          body2, _, status2 = post_mcp({
              "jsonrpc": "2.0", "id": 3, "method": "tools/call",
              "params": {"name": "list_channels", "arguments": {"organizationId": org_id}}
          }, session_id=session_id)
          print("Status: " + str(status2))
          print("Body: " + body2[:800])

          parsed = safe_json(body2)
          ch_text = extract_text(parsed)
          print("Channels text: " + ch_text[:400])

          channels = []
          try:
              ch_data = json.loads(ch_text) if ch_text else {}
              if isinstance(ch_data, list):
                  channels = ch_data
              elif isinstance(ch_data, dict):
                  for key in ["channels", "data", "items", "nodes"]:
                      if key in ch_data and isinstance(ch_data[key], list):
                          channels = ch_data[key]
                          break
          except Exception as ex:
              print("Error extrayendo canales: " + str(ex))

          print("\n=== RESULTADO ===")
          if channels:
              print("Canales: " + str(len(channels)))
              for c in channels:
                  print("  ID:      " + str(c.get("id", "?")))
                  print("  Red:     " + str(c.get("service", "?")))
                  print("  Nombre:  " + str(c.get("name") or c.get("displayName", "?")))
                  print("  Usuario: @" + str(c.get("serviceUsername") or c.get("handle", "?")))
                  print("  ---")
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
              if summary_path:
                  with open(summary_path, "a") as f:
                      f.write("## Canales de Buffer\n\n")
                      f.write("| Red | Usuario | ID |\n|-----|---------|----|\n")
                      for c in channels:
                          f.write("| " + str(c.get("service","?")) + " | @" + str(c.get("serviceUsername") or c.get("handle","?")) + " | `" + str(c.get("id","?")) + "` |\n")
                      f.write("\nCopia el ID de Instagram y guardalo en Secrets como BUFFER_PROFILE_ID\n")
          else:
              print("No se encontraron canales. Body completo:")
              print(body2)
          PYEOF
