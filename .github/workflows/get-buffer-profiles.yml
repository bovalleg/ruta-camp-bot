name: 🔍 Ver Perfiles de Buffer

on:
  workflow_dispatch:

jobs:
  profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar token y obtener perfiles
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json

          token = os.environ.get("BUFFER_TOKEN", "")

          if not token:
              print("❌ ERROR: El secret BUFFER_TOKEN está vacío.")
              print("   Ve a Settings → Secrets → Actions → New repository secret")
              exit(1)

          print(f"Token encontrado: {token[:6]}...{token[-4:]} (longitud: {len(token)})")

          # Buffer API acepta el token como query param o como Bearer header
          # Probamos ambos formatos
          urls_to_try = [
              f"https://api.bufferapp.com/1/profiles.json?access_token={token}",
              "https://api.bufferapp.com/1/profiles.json",
          ]
          headers_list = [
              {},
              {"Authorization": f"Bearer {token}"},
          ]

          for url, headers in zip(urls_to_try, headers_list):
              method = "query param" if "access_token" in url else "Bearer header"
              print(f"\nProbando con {method}...")
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      profiles = json.loads(resp.read())
                      print(f"✅ Éxito con {method}!\n")
                      print("========== TUS PERFILES EN BUFFER ==========\n")
                      for p in profiles:
                          print(f"Red:      {p.get('service','?').upper()}")
                          print(f"Usuario:  @{p.get('formatted_username','?')}")
                          print(f"ID:       {p.get('id','?')}   ← COPIA ESTE ID")
                          print("-" * 45)

                      # Write summary
                      summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
                      if summary_file:
                          with open(summary_file, "a") as f:
                              f.write("## ✅ Perfiles de Buffer encontrados\n\n")
                              f.write("| Red | Usuario | **ID — pégalo en el bot** |\n")
                              f.write("|-----|---------|---------------------------|\n")
                              for p in profiles:
                                  f.write(f"| {p.get('service','?')} | @{p.get('formatted_username','?')} | `{p.get('id','?')}` |\n")
                              f.write("\n> Copia el ID de Instagram y pégalo en:\n")
                              f.write("> 1. GitHub Secrets → `BUFFER_PROFILE_ID`\n")
                              f.write("> 2. ⚙️ Configuración del bot → 'ID de Perfil de Instagram'\n")
                      exit(0)
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"   Error HTTP {e.code}: {e.reason}")
                  print(f"   Respuesta: {body[:300]}")
              except Exception as ex:
                  print(f"   Error: {ex}")

          print("\n❌ Ningún método funcionó.")
          print("\nPosibles causas:")
          print("  1. El token de Buffer es incorrecto o expiró")
          print("  2. El token debe ser el 'Access Token' de Buffer (no el Client Secret)")
          print("  3. Genera un nuevo token en: buffer.com → settings → apps")
          exit(1)
          PYEOF
