name: 🔍 Ver Canales de Buffer

on:
  workflow_dispatch:

jobs:
  profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener canales via Buffer MCP
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json

          token = os.environ.get("BUFFER_TOKEN", "").strip()
          MCP_URL = "https://mcp.buffer.com/mcp"

          if not token:
              print("❌ BUFFER_TOKEN vacío")
              exit(1)

          print(f"Token: {token[:8]}...{token[-4:]}\n")

          def mcp_init():
              payload = json.dumps({
                  "jsonrpc": "2.0", "id": 1, "method": "initialize",
                  "params": {
                      "protocolVersion": "2024-11-05",
                      "capabilities": {},
                      "clientInfo": {"name": "ruta-camp-bot", "version": "1.0"}
                  }
              }).encode()
              req = urllib.request.Request(MCP_URL, data=payload, headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/json, text/event-stream",
              }, method="POST")
              with urllib.request.urlopen(req, timeout=15) as resp:
                  body = resp.read().decode()
                  sid = resp.headers.get("Mcp-Session-Id", "")
              print(f"  Init body: {body[:300]}")
              return sid

          def parse_mcp_body(body):
              """Parse MCP response — handles SSE, plain JSON, and empty body."""
              body = body.strip()
              if not body:
                  return {}
              # SSE format: lines starting with "data:"
              for line in body.splitlines():
                  line = line.strip()
                  if line.startswith("data:"):
                      chunk = line[5:].strip()
                      if chunk and chunk != "[DONE]":
                          try: return json.loads(chunk)
                          except: pass
              # Plain JSON
              try: return json.loads(body)
              except: pass
              print(f"  [warn] No se pudo parsear body: {body[:200]}")
              return {}

          def mcp_call(session_id, tool, arguments={}):
              payload = json.dumps({
                  "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                  "params": {"name": tool, "arguments": arguments}
              }).encode()
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/json, text/event-stream",
              }
              if session_id:
                  headers["Mcp-Session-Id"] = session_id
              req = urllib.request.Request(MCP_URL, data=payload, headers=headers, method="POST")
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = resp.read().decode()
              print(f"  [{tool}] raw: {body[:400]}")
              return parse_mcp_body(body)

          def extract_content_text(response):
              """Safely extract the text content from an MCP tool response."""
              # Try result.content[0].text
              try:
                  text = response["result"]["content"][0]["text"]
                  return text
              except (KeyError, IndexError, TypeError):
                  pass
              # Try result directly
              try:
                  return response["result"]
              except (KeyError, TypeError):
                  pass
              return None

          print("Conectando al MCP de Buffer...")
          session_id = mcp_init()
          print(f"Session ID: '{session_id}'\n")

          # Get account
          print("Obteniendo cuenta...")
          acc_resp = mcp_call(session_id, "get_account")
          acc_text = extract_content_text(acc_resp)
          print(f"  Account text: {str(acc_text)[:300]}")

          org_id = ""
          if acc_text:
              if isinstance(acc_text, str):
                  try:
                      acc_data = json.loads(acc_text)
                  except:
                      acc_data = {}
              else:
                  acc_data = acc_text
              # Try different paths for org ID
              for path in [["organization","id"], ["account","id"], ["id"]]:
                  d = acc_data
                  try:
                      for k in path: d = d[k]
                      if d: org_id = str(d); break
                  except (KeyError, TypeError):
                      pass

          print(f"  Org ID: '{org_id}'\n")

          # List channels
          print("Listando canales...")
          args = {"organizationId": org_id} if org_id else {}
          ch_resp = mcp_call(session_id, "list_channels", args)
          ch_text = extract_content_text(ch_resp)
          print(f"  Channels text: {str(ch_text)[:400]}")

          channels = []
          if ch_text:
              if isinstance(ch_text, str):
                  try: ch_data = json.loads(ch_text)
                  except: ch_data = {}
              else:
                  ch_data = ch_text
              if isinstance(ch_data, list):
                  channels = ch_data
              elif isinstance(ch_data, dict):
                  channels = ch_data.get("channels") or ch_data.get("data") or ch_data.get("items") or []

          if not channels:
              print("\n⚠ No se encontraron canales. Respuesta completa:")
              print(json.dumps(ch_resp, indent=2, ensure_ascii=False)[:800])
              exit(0)

          print(f"\n{'='*50}")
          print(f"✅ {len(channels)} canal(es) encontrado(s):\n")
          for c in channels:
              print(f"  Red:     {c.get('service','?').upper()}")
              print(f"  Nombre:  {c.get('name') or c.get('displayName','?')}")
              print(f"  Usuario: @{c.get('serviceUsername') or c.get('handle','?')}")
              print(f"  ID:      {c.get('id','?')}  ← USA ESTE como BUFFER_PROFILE_ID")
              print(f"{'-'*50}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY","")
          if summary and channels:
              with open(summary,"a") as f:
                  f.write("## ✅ Canales de Buffer\n\n")
                  f.write("| Red | Usuario | ID |\n")
                  f.write("|-----|---------|----|\n")
                  for c in channels:
                      f.write(f"| {c.get('service','?')} | @{c.get('serviceUsername') or c.get('handle','?')} | `{c.get('id','?')}` |\n")
                  f.write("\n**Próximo paso:** copia el ID de Instagram → GitHub Secrets → `BUFFER_PROFILE_ID`\n")
          PYEOF
